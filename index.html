<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سوق فاقوس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:        #16a34a;
      --green-dark:   #15803d;
      --green-light:  #dcfce7;
      --green-bg:     #f0fdf4;
      --white:        #ffffff;
      --gray-50:      #f9fafb;
      --gray-100:     #f3f4f6;
      --gray-200:     #e5e7eb;
      --gray-400:     #9ca3af;
      --gray-500:     #6b7280;
      --gray-700:     #374151;
      --gray-900:     #111827;
      --red:          #ef4444;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.08);
      --shadow-md:    0 4px 16px rgba(0,0,0,.12);
      --radius:       16px;
      --radius-sm:    10px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input, textarea, select { font-family: inherit; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 4px; }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Utilities ── */
    .hidden   { display: none !important; }
    .w-full   { width: 100%; }

    /* ── Toast ── */
    #toast-container {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; min-width: 260px;
    }
    .toast {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; color: #fff;
      box-shadow: var(--shadow-md);
      animation: toastIn .3s ease;
      pointer-events: all;
    }
    .toast-default  { background: var(--gray-900); }
    .toast-success  { background: var(--green); }
    .toast-error    { background: var(--red); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 16px;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .logo-icon { font-size: 26px; }
    .logo-text { font-size: 20px; font-weight: 800; color: var(--green); }
    .cart-btn {
      position: relative; padding: 9px; border-radius: var(--radius-sm);
      transition: background .2s; font-size: 22px; line-height: 1;
    }
    .cart-btn:hover { background: var(--green-bg); }
    .cart-count {
      position: absolute; top: -2px; left: -2px;
      background: var(--green); color: #fff;
      font-size: 10px; font-weight: 700;
      min-width: 18px; height: 18px; padding: 0 4px;
      border-radius: 999px; display: flex; align-items: center; justify-content: center;
    }

    /* ── Container / Pages ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Categories Bar ── */
    .cats-scroll-wrap { margin-bottom: 24px; overflow: hidden; padding: 4px 0; }
    .cats-grid {
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
    }
    .cat-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px; background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); min-width: 82px; cursor: pointer;
      transition: all .2s; text-align: center;
    }
    .cat-item:hover { border-color: var(--green); background: var(--green-bg); }
    .cat-icon { font-size: 24px; }
    .cat-name { font-size: 12px; font-weight: 700; color: var(--gray-700); white-space: nowrap; }

    /* ── Carousel Layout with Next Item Preview ── */
    .carousel-section { margin-bottom: 28px; }
    .carousel-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .carousel-title { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 800; }
    .more-btn { color: var(--green); font-size: 13px; font-weight: 700; }
    .carousel-track {
      display: flex; gap: 12px; overflow-x: auto; padding: 4px 0;
      scroll-snap-type: x mandatory;
    }
    /* Show exactly 2.3 items on mobile to provide a visual cue for next products */
    .carousel-track .product-card {
      scroll-snap-align: start;
      flex: 0 0 calc(45% - 6px);
      min-width: 155px;
    }
    @media (min-width: 600px) {
      .carousel-track .product-card { flex: 0 0 calc(25% - 9px); }
    }
    @media (min-width: 900px) {
      .carousel-track .product-card { flex: 0 0 calc(16.66% - 10px); }
    }

    /* ── Product Card ── */
    .product-card {
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 12px; display: flex;
      flex-direction: column; gap: 8px; position: relative; transition: box-shadow .2s;
    }
    .product-card:hover { box-shadow: var(--shadow-md); }
    .product-img {
      width: 100%; aspect-ratio: 1; border-radius: var(--radius-sm);
      background: #ffffff; display: flex; align-items: center; justify-content: center;
      font-size: 40px; overflow: hidden; border: 1px solid var(--gray-100);
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; background-color: #fff; }
    .product-name { font-size: 13px; font-weight: 700; text-align: center; }
    .product-price { font-size: 12px; color: var(--gray-500); text-align: center; }
    
    .qty-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--gray-100); border-radius: var(--radius-sm); padding: 4px; margin-top: auto;
    }
    .qty-btn {
      width: 28px; height: 28px; background: var(--white); border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm); color: var(--gray-700);
    }
    .qty-btn:disabled { opacity: 0.4; }
    .qty-val { font-size: 13px; font-weight: 700; color: var(--gray-900); min-width: 32px; text-align: center; }
    .product-total { font-size: 13px; font-weight: 800; text-align: center; color: var(--green); }

    /* ── BANNED HERO Removed, Styles kept for other components ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; font-weight: 600; border-radius: var(--radius-sm);
      transition: all .2s; cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm  { padding: 7px 14px;  font-size: 13px; }
    .btn-md  { padding: 10px 18px; font-size: 14px; }
    .btn-lg  { padding: 14px 22px; font-size: 15px; }
    .btn-primary { background: var(--green); color: #fff; border: none; }
    .btn-primary:hover:not(:disabled) { background: var(--green-dark); }
    .btn-outline { background: transparent; color: var(--green); border: 2px solid var(--green); }
    .btn-outline:hover { background: var(--green-bg); }
    
    .input {
      width: 100%; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
      padding: 11px 16px; font-size: 14px; outline: none; background: var(--white); color: var(--gray-900);
    }
    .input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.12); }
    textarea.input { resize: vertical; min-height: 88px; }

    /* ── Category Horizontal Product Style (4-5 Items per Screen) ── */
    .cat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .cat-page-icon { font-size: 32px; }
    .cat-page-name { font-size: 20px; font-weight: 800; }
    .cat-page-count { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
    
    /* Horizontal list design inside categories */
    .products-horizontal-list { display: flex; flex-direction: column; gap: 10px; }
    .horizontal-prod-card {
      display: flex; align-items: center; background: var(--white); border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); padding: 10px; gap: 12px;
    }
    .horizontal-prod-card .product-img { width: 64px; height: 64px; flex-shrink: 0; font-size: 24px; }
    .horizontal-prod-info { flex: 1; min-width: 0; }
    .horizontal-prod-info .product-name { text-align: right; font-size: 14px; margin-bottom: 2px; }
    .horizontal-prod-info .product-price { text-align: right; font-size: 12px; }
    .horizontal-prod-card .qty-wrapper-box { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    /* ── Cart Page ── */
    .cart-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .cart-item {
      display: flex; align-items: center; background: var(--white);
      border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 10px; gap: 12px;
    }
    .cart-item-img {
      width: 50px; height: 50px; border-radius: 8px; background: var(--green-bg);
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-details { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 700; }
    .cart-item-p { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .cart-item-price { font-size: 14px; font-weight: 800; color: var(--green); margin: 0 10px; }
    .cart-del-btn { font-size: 18px; padding: 4px; color: var(--red); }

    .summary-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 16px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: var(--gray-700); }
    .summary-row.total { font-size: 16px; font-weight: 800; color: var(--gray-900); border-top: 1px solid var(--gray-200); padding-top: 10px; }

    /* ── Checkout Form ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
    .form-label .optional { font-weight: 400; color: var(--gray-400); font-size: 12px; }
    .form-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--gray-100); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

    /* ── Success Page ── */
    .success-page { text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 60px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .success-num { font-size: 26px; font-weight: 800; color: var(--green); margin: 12px 0; }
    .success-desc { font-size: 14px; color: var(--gray-500); margin-bottom: 24px; line-height: 1.6; }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <header class="header">
    <div class="header-inner">
      <div class="logo" onclick="navigateTo('home')">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">سوق فاقوس</span>
      </div>
      <button class="cart-btn" onclick="navigateTo('cart')" title="السلة">
        <span>🛒</span>
        <span class="cart-count" id="cart-badge">0</span>
      </button>
    </div>
  </header>

  <div class="page active" id="page-home">
    <div class="container">
      <div class="cats-scroll-wrap">
        <div class="cats-grid" id="cats-grid"></div>
      </div>
      <div id="carousels"></div>
    </div>
  </div>

  <div class="page" id="page-category">
    <div class="container">
      <div class="cat-header">
        <span class="cat-page-icon" id="cat-page-icon"></span>
        <div>
          <p class="cat-page-name" id="cat-page-name"></p>
          <p class="cat-page-count" id="cat-page-count"></p>
        </div>
      </div>
      <div class="products-horizontal-list" id="cat-products-grid"></div>
    </div>
  </div>

  <div class="page" id="page-cart">
    <div class="container" style="max-width:680px">
      <h1 class="success-title" style="text-align:right; margin-bottom:20px;">سلة التسوق</h1>
      <div id="cart-list-wrap" class="cart-list"></div>
      <div id="cart-summary-wrap" class="summary-card hidden">
        <div class="summary-row"><span>إجمالي المنتجات:</span><span id="cart-subtotal">0 ج</span></div>
        <div class="summary-row"><span>مصاريف التوصيل:</span><span id="cart-fee">0 ج</span></div>
        <div class="summary-row total"><span>الإجمالي الكلي:</span><span id="cart-total">0 ج</span></div>
        <button class="btn btn-primary btn-lg w-full" style="margin-top:14px" onclick="navigateTo('checkout')">
          الانتقال لتأكيد الطلب
        </button>
      </div>
    </div>
  </div>

  <div class="page" id="page-checkout">
    <div class="container" style="max-width:620px">
      <form id="checkout-form" onsubmit="handleCheckout(event)">
        <div class="summary-card">
          <h2 class="modal-title" style="margin-bottom:16px">تفاصيل التوصيل</h2>
          <div style="display:flex; flex-direction:column; gap:12px">
            <div class="form-group">
              <label class="form-label">الاسم بالكامل</label>
              <input class="input" id="f-name" required placeholder="مثال: محمد غريب" />
            </div>
            <div class="form-group">
              <label class="form-label">رقم واتساب للتواصل</label>
              <input class="input" id="f-wa" type="tel" required placeholder="مثال: 01012345678" />
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">المنطقة / الحي</label>
                <input class="input" id="f-zone" required placeholder="مثال: وسط البلد" />
              </div>
              <div class="form-group">
                <label class="form-label">اسم الشارع</label>
                <input class="input" id="f-street" required placeholder="المشروع أو الشارع الرئيسي" />
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">رقم المنزل</label>
                <input class="input" id="f-house" required placeholder="مبنى رقم..." />
              </div>
              <div class="form-group">
                <label class="form-label">الطابق <span class="optional">(اختياري)</span></label>
                <input class="input" id="f-floor" placeholder="مثال: الأرضي أو الثالث" />
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">رقم الشقة <span class="optional">(اختياري)</span></label>
                <input class="input" id="f-apt" placeholder="شقة رقم..." />
              </div>
              <div class="form-group">
                <label class="form-label">علامة مميزة <span class="optional">(اختياري)</span></label>
                <input class="input" id="f-landmark" placeholder="مثال: بجوار مسجد التقوى" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">ملاحظات إضافية <span class="optional">(اختياري)</span></label>
              <textarea class="input" id="f-notes" placeholder="أي تفاصيل أخرى تود إخبار مندوب التوصيل بها..."></textarea>
            </div>
          </div>
          <div style="margin: 20px 0; padding-top: 16px; border-top: 1px solid var(--gray-200);" id="checkout-summary-lines"></div>
          <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">تأكيد وإرسال الطلب</button>
        </div>
      </form>
    </div>
  </div>

  <div class="page" id="page-success">
    <div class="container">
      <div class="success-page">
        <div class="success-icon">✅</div>
        <h2 class="success-title">تم استلام طلبك بنجاح!</h2>
        <p style="color:var(--gray-500); font-size:14px">رقم تتبع طلبك هو</p>
        <div class="success-num" id=\"success-order-num\">#0</div>
        <p class="success-desc">سيتواصل معك فريق العمل ومندوب التوصيل عبر واتساب قريباً جداً لتأكيد الموعد.</p>
        <button class="btn btn-primary btn-lg" onclick="navigateTo('home')">العودة للتسوق</button>
      </div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/store.js"></script>
</body>
</html>
