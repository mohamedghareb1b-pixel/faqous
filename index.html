<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق فاقوس - المتجر الإلكتروني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <header class="bg-green-600 text-white sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 id="store-name" class="text-2xl font-bold">جاري التحميل...</h1>
            <button id="cart-btn" class="relative bg-green-700 hover:bg-green-800 px-4 py-2 rounded-lg flex items-center gap-2 transition">
                <span>🛒 السلة</span>
                <span id="cart-count" class="bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-6">
        <section class="mb-8">
            <h2 class="text-lg font-bold mb-3 flex items-center gap-2">📂 الأقسام</h2>
            <div id="categories-container" class="flex gap-3 overflow-x-auto pb-2 scrollbar-none">
                <p class="text-xs text-gray-400">جاري تحميل الأقسام...</p>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🥦 المنتجات المتاحة</h2>
            <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <p class="col-span-2 md:col-span-4 text-center text-gray-400 py-8">جاري مزامنة المنتجات من سوبابيز...</p>
            </div>
        </section>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex justify-end transition-opacity">
        <div class="bg-white w-full max-w-md h-full flex flex-col p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-xl font-bold">🛒 سلة المشتريات</h3>
                <button id="close-cart" class="text-gray-500 hover:text-red-500 text-2xl">&times;</button>
            </div>

            <div id="cart-items" class="flex-1 overflow-y-auto space-y-3">
                <p class="text-center text-gray-400 py-8">السلة فارغة حالياً</p>
            </div>

            <div class="border-t pt-4 space-y-2 text-sm">
                <div class="flex justify-between"><span>إجمالي المنتجات:</span> <span id="subtotal-val">0.00 ج.م</span></div>
                <div class="flex justify-between"><span>مصاريف التوصيل:</span> <span id="delivery-val">0.00 ج.م</span></div>
                <div class="flex justify-between font-bold text-lg text-green-600"><span>الإجمالي الكلي:</span> <span id="total-val">0.00 ج.م</span></div>
            </div>

            <form id="checkout-form" class="mt-4 space-y-3">
                <h4 class="font-bold text-gray-700 border-b pb-1">📍 بيانات التوصيل</h4>
                <input type="text" id="order-fullname" placeholder="الاسم بالكامل" required class="w-full p-2 border rounded text-sm focus:outline-green-500">
                <input type="tel" id="order-whatsapp" placeholder="رقم الواتساب المستلم" required class="w-full p-2 border rounded text-sm focus:outline-green-500">
                <input type="tel" id="order-phone-extra" placeholder="رقم هاتف إضافي (اختياري)" class="w-full p-2 border rounded text-sm focus:outline-green-500">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="order-zone" placeholder="المنطقة / الحي" required class="w-full p-2 border rounded text-sm focus:outline-green-500">
                    <input type="text" id="order-street" placeholder="اسم الشارع" required class="w-full p-2 border rounded text-sm focus:outline-green-500">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="order-house" placeholder="رقم المنزل" required class="w-full p-2 border rounded text-sm focus:outline-green-500">
                    <input type="text" id="order-floor" placeholder="الدور">
                    <input type="text" id="order-apartment" placeholder="الشقة">
                </div>

                <input type="text" id="order-landmark" placeholder="علامة مميزة (مثلاً بجوار مسجد...)" class="w-full p-2 border rounded text-sm focus:outline-green-500">
                <textarea id="order-notes" placeholder="أي ملاحظات إضافية للطلب..." rows="2" class="w-full p-2 border rounded text-sm focus:outline-green-500"></textarea>

                <button type="submit" id="submit-order-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow transition mt-2">
                    ✅ تأكيد الطلب وإرساله
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/db.js"></script>
    <script src="js/store.js"></script>
</body>
</html>
