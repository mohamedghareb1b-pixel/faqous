<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة — سوق فاقوس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:        #16a34a;
      --green-dark:   #15803d;
      --green-light:  #dcfce7;
      --green-bg:     #f0fdf4;
      --white:        #ffffff;
      --gray-50:      #f9fafb;
      --gray-100:     #f3f4f6;
      --gray-200:     #e5e7eb;
      --gray-400:     #9ca3af;
      --gray-500:     #6b7280;
      --gray-700:     #374151;
      --gray-900:     #111827;
      --red:          #ef4444;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.08);
      --shadow-md:    0 4px 16px rgba(0,0,0,.12);
      --radius:       14px;
      --radius-sm:    8px;
    }
    body { font-family: 'Cairo', sans-serif; background: var(--white); color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input, textarea, select { font-family: inherit; }

    .hidden { display: none !important; }
    .w-full { width: 100%; }

    #toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; min-width: 260px; }
    .toast { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: #fff; box-shadow: var(--shadow-md); pointer-events: all; }
    .toast-default { background: var(--gray-900); }
    .toast-success { background: var(--green); }
    .toast-error   { background: var(--red); }

    .modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-box { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-md); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; }
    .modal-box.modal-lg { max-width: 720px; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--gray-200); }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--gray-500); }
    .modal-close:hover { background: var(--gray-100); }
    .modal-body { padding: 20px; overflow-y: auto; }

    .card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600; border-radius: var(--radius-sm); transition: all .2s; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-md { padding: 10px 16px; font-size: 14px; }
    .btn-lg { padding: 14px 20px; font-size: 15px; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-outline { border: 1.5px solid var(--green); color: var(--green); }
    .btn-outline:hover { background: var(--green-bg); }
    .btn-ghost { color: var(--gray-500); }
    .btn-ghost:hover { background: var(--gray-100); color: var(--gray-900); }

    .input { width: 100%; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; outline: none; background: var(--white); }
    .input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.12); }

    /* Login Screen */
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; background: var(--gray-100); }
    .login-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 32px 24px; width: 100%; max-width: 400px; box-shadow: var(--shadow-md); text-align: center; }

    /* Layout Dashboard */
    .admin-wrapper { display: flex; min-height: 100vh; width: 100%; position: relative; }
    .admin-sidebar { width: 240px; background: var(--white); border-left: 1px solid var(--gray-200); display: flex; flex-direction: column; padding: 20px 0; position: fixed; right: 0; top: 0; bottom: 0; z-index: 100; }
    .sidebar-brand { padding: 0 20px 20px 20px; border-bottom: 1px solid var(--gray-100); margin-bottom: 20px; }
    .sidebar-logo-text { font-size: 18px; font-weight: 800; color: var(--green); }
    .sidebar-nav { flex: 1; padding: 0 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: var(--gray-700); width: 100%; text-align: right; }
    .nav-link:hover { background: var(--gray-50); color: var(--gray-900); }
    .nav-link.active { background: var(--green-bg); color: var(--green); font-weight: 700; }
    
    .admin-main { flex: 1; margin-right: 240px; display: flex; flex-direction: column; min-height: 100vh; background: var(--white); }
    .admin-header { height: 60px; background: var(--white); border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 90; }
    .admin-content { padding: 24px; flex: 1; max-width: 1200px; width: 100%; margin: 0 auto; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 14px; }
    .stat-icon { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--green-bg); font-size: 20px; display: flex; align-items: center; justify-content: center; }
    .stat-title { font-size: 12px; color: var(--gray-500); font-weight: 600; }
    .stat-value { font-size: 20px; font-weight: 800; margin-top: 2px; }

    .dash-recent-box { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 20px; }
    .dash-order-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
    .dash-order-row:last-child { border-bottom: none; }

    .filter-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 16px; }
    .filter-pill { padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; background: var(--white); border: 1px solid var(--gray-200); color: var(--gray-600); }
    .filter-pill.active { background: var(--green); border-color: var(--green); color: #fff; }

    .orders-list-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 640px) { .orders-list-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1000px) { .orders-list-grid { grid-template-columns: repeat(3, 1fr); } }
    .order-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 16px; cursor: pointer; transition: all .2s; }
    .order-card:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: var(--shadow-sm); }

    .status { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .status-new { background: #dbeafe; color: #1e40af; }
    .status-prep { background: #fef3c7; color: #92400e; }
    .status-delivery { background: #e0f2fe; color: #0369a1; }
    .status-done { background: #dcfce7; color: #166534; }
    .status-cancel { background: #fee2e2; color: #991b1b; }

    .products-list-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (min-width: 768px) { .products-list-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1100px) { .products-list-grid { grid-template-columns: repeat(5, 1fr); } }
    .prod-admin-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
    .prod-admin-card.disabled { opacity: 0.5; background: var(--gray-100); }

    .notif-wrapper { position: relative; }
    .notif-badge { position: absolute; top: -4px; left: -4px; background: var(--red); color: #fff; font-size: 9px; font-weight: 700; width: 16px; height: 16px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
    .notif-dropdown { position: absolute; left: 0; top: 40px; width: 280px; background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 10px; z-index: 200; max-height: 360px; overflow-y: auto; }
    .notif-item { padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 4px; cursor: pointer; border-bottom: 1px solid var(--gray-50); }
    .notif-item:hover { background: var(--gray-50); }
    .notif-item.read { opacity: 0.6; }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div class="modal-head">
        <h3 class="modal-title" id="modal-title">تفاصيل</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="login-container" id="admin-login">
    <div class="login-card">
      <h2 style="font-size:22px;font-weight:800;color:var(--green);margin-bottom:6px">لوحة إدارة سوق فاقوس</h2>
      <p style="font-size:13px;color:var(--gray-500);margin-bottom:20px">لوحة تحكم المتجر المركزي والتحكم بالطلبات</p>
      <form onsubmit="adminLogin(event)">
        <div class="form-group" style="text-align:right">
          <label class="form-label">كلمة مرور المشرف</label>
          <input type="password" class="input" id="admin-pass" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-md w-full" style="margin-top:10px">دخول لوحة التحكم</button>
      </form>
    </div>
  </div>

  <div class="admin-wrapper hidden" id="admin-dashboard">
    
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo-text">⚙️ لوحة الإدارة</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-link active" onclick="showAdminPage('dashboard', this)">📊 الرئيسية</button>
        <button class="nav-link" onclick="showAdminPage('orders', this)">📋 إدارة الطلبات</button>
        <button class="nav-link" onclick="showAdminPage('products', this)">🥦 إدارة المنتجات</button>
        <button class="nav-link" onclick="showAdminPage('settings', this)">⚙️ الإعدادات العامة</button>
      </nav>
      <div style="padding: 0 12px; margin-bottom: 20px;">
        <button class="btn btn-outline btn-sm w-full" style="color:var(--red);border-color:var(--red);" onclick="adminLogout()">🚪 تسجيل الخروج</button>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-header">
        <h2 id="admin-page-title" style="font-size:16px;font-weight:800">الرئيسية</h2>
        
        <div style="display:flex;align-items:center;gap:14px">
          <div class="notif-wrapper">
            <button class="btn btn-ghost" style="font-size:18px;padding:6px;" onclick="toggleNotifDrop()">🔔</button>
            <span class="notif-badge hidden" id="notif-badge">0</span>
            
            <div class="notif-dropdown hidden" id="notif-drop">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--gray-100)">
                <span style="font-size:12px;font-weight:700">الإشعارات الواردة</span>
                <button style="font-size:11px;color:var(--green);font-weight:700;" onclick="markAllRead()">قراءة الكل</button>
              </div>
              <div id="notif-items"></div>
            </div>
          </div>
          <p style="font-size:13px;font-weight:700">أهلاً بك، المدير 👋</p>
        </div>
      </header>

      <div class="admin-content">
        
        <div class="admin-page" id="admin-page-dashboard">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">🔔</div>
              <div><p class="stat-title">طلبات جديدة</p><p class="stat-value" id="stat-new">0</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📅</div>
              <div><p class="stat-title">طلبات اليوم</p><p class="stat-value" id="stat-today">0</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🥦</div>
              <div><p class="stat-title">المنتجات النشطة</p><p class="stat-value" id="stat-products">0</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">💰</div>
              <div><p class="stat-title">المبيعات المكتملة</p><p class="stat-value" id="stat-sales">0 ج</p></div>
            </div>
          </div>

          <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">📈 أحدث الطلبات الواردة للمتجر</h3>
          <div class="dash-recent-box" id="dash-recent-orders"></div>
        </div>

        <div class="admin-page hidden" id="admin-page-orders">
          <div class="filter-pills" id="order-filters"></div>
          <div class="orders-list-grid" id="orders-list"></div>
        </div>

        <div class="admin-page hidden" id="admin-page-products">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px">
            <select class="input" id="prod-cat-filter" style="max-width:200px" onchange="setProdFilter(this.value)">
              <option value="0">كل الأقسام</option>
            </select>
            <button class="btn btn-primary btn-md" onclick="openProductModal()">➕ إضافة منتج جديد</button>
          </div>
          <div class="products-list-grid" id="products-grid"></div>
        </div>

        <div class="admin-page hidden" id="admin-page-settings">
          <div class="card" style="padding:20px;max-width:600px;display:flex;flex-direction:column;gap:14px">
            <div class="form-group">
              <label class="form-label">اسم المتجر الالكتروني</label>
              <input type="text" class="input" id="set-name" />
            </div>
            <div class="form-group">
              <label class="form-label">رقم واتساب استلام طلبات الشحن</label>
              <input type="text" class="input" id="set-wa" />
            </div>
            <div class="form-group">
              <label class="form-label">رسوم التوصيل الثابتة بفاقوس (جنيه)</label>
              <input type="number" class="input" id="set-fee" />
            </div>
            <div class="form-group">
              <label class="form-label">حالة استقبال الطلبات</label>
              <button class="btn btn-md btn-primary" id="set-open-btn" onclick="toggleStoreSetting()">المتجر مفتوح الآن</button>
            </div>
            <button class="btn btn-primary btn-md" style="margin-top:10px" onclick="saveSettings()">💾 حفظ الإعدادات العامة</button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="js/db.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
