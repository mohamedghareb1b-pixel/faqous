<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة — سوق فاقوس</title>
  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)" />
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap)"
    rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:        #16a34a;
      --green-dark:   #15803d;
      --green-light:  #dcfce7;
      --green-bg:     #f0fdf4;
      --white:        #ffffff;
      --gray-50:      #f9fafb;
      --gray-100:     #f3f4f6;
      --gray-200:     #e5e7eb;
      --gray-400:     #9ca3af;
      --gray-500:     #6b7280;
      --gray-700:     #374151;
      --gray-900:     #111827;
      --red:          #ef4444;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.08);
      --shadow-md:    0 4px 16px rgba(0,0,0,.12);
      --radius:       16px;
      --radius-sm:    10px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input, textarea, select { font-family: inherit; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 4px; }

    /* ── Utilities ── */
    .hidden { display: none !important; }
    .w-full { width: 100%; }

    /* ── Toast ── */
    #toast-container {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; min-width: 260px;
    }
    .toast {
      display: flex; align-items: center; gap: 8px; padding: 12px 18px;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
      color: #fff; box-shadow: var(--shadow-md);
      animation: toastIn .3s ease; pointer-events: all;
    }
    .toast-default { background: var(--gray-900); }
    .toast-success { background: var(--green); }
    .toast-error   { background: var(--red); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-box {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-md); width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
      animation: modalIn .25s ease;
    }
    .modal-lg { max-width: 680px; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--gray-500); transition: background .2s;
    }
    .modal-close:hover { background: var(--gray-100); }
    .modal-body { padding: 20px; }

    /* ── Card ── */
    .card {
      background: var(--white); border-radius: var(--radius);
      border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; font-weight: 600; border-radius: var(--radius-sm);
      transition: all .2s; cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm  { padding: 6px 12px;  font-size: 12px; }
    .btn-md  { padding: 10px 18px; font-size: 14px; }
    .btn-lg  { padding: 13px 22px; font-size: 15px; }
    .btn-primary { background: var(--green); color: #fff; border: none; }
    .btn-primary:hover:not(:disabled) { background: var(--green-dark); }
    .btn-outline { background: transparent; color: var(--green); border: 2px solid var(--green); }
    .btn-outline:hover { background: var(--green-bg); }
    .btn-ghost { background: transparent; color: var(--gray-700); border: none; }
    .btn-ghost:hover { background: var(--gray-100); }
    .btn-danger { background: var(--red); color: #fff; border: none; }
    .btn-danger:hover { background: #dc2626; }
    .btn-wa { background: #25D366; color: #fff; border: none; }
    .btn-wa:hover { background: #1ebe5d; }

    /* ── Input ── */
    .input {
      width: 100%; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
      padding: 11px 16px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s;
      background: var(--white); color: var(--gray-900);
    }
    .input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.12); }
    textarea.input { resize: vertical; min-height: 88px; }

    /* ── Status Pills ── */
    .status {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: 999px; font-size: 12px; font-weight: 600;
    }
    .status-new      { background: #fff7ed; color: #c2410c; }
    .status-prep     { background: #eff6ff; color: #1d4ed8; }
    .status-delivery { background: #faf5ff; color: #7e22ce; }
    .status-done     { background: var(--green-light); color: var(--green-dark); }
    .status-cancel   { background: #fef2f2; color: #b91c1c; }

    /* ── Login ── */
    .login-page {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .login-card { width: 100%; max-width: 380px; padding: 36px 28px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo-icon { font-size: 52px; }
    .login-logo-name { font-size: 22px; font-weight: 800; color: var(--green); margin-top: 8px; }
    .login-logo-sub  { font-size: 14px; color: var(--gray-500); margin-top: 4px; }

    /* ── Admin Layout ── */
    .admin-wrap { display: flex; min-height: 100vh; }

    /* Sidebar */
    .admin-sidebar {
      width: 220px; background: var(--white);
      border-left: 1px solid var(--gray-200);
      display: flex; flex-direction: column; padding: 20px 0;
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 50;
      transition: transform .3s ease;
    }
    @media (max-width: 768px) {
      .admin-sidebar { transform: translateX(220px); }
      .admin-sidebar.open { transform: translateX(0); }
    }
    .sidebar-logo { padding: 0 16px 20px; border-bottom: 1px solid var(--gray-100); margin-bottom: 12px; }
    .sidebar-logo-text { font-size: 17px; font-weight: 800; color: var(--green); }
    .sidebar-logo-sub  { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 0 10px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; color: var(--gray-700);
      cursor: pointer; transition: all .2s; margin-bottom: 4px;
      border: none; background: none; width: 100%; text-align: right;
      font-family: inherit;
    }
    .nav-link:hover { background: var(--gray-50); color: var(--gray-900); }
    .nav-link.active { background: var(--green-bg); color: var(--green); font-weight: 700; }
    .nav-icon { font-size: 17px; }
    .sidebar-footer { padding: 0 10px; }

    /* Main */
    .admin-main {
      flex: 1; margin-right: 220px; display: flex; flex-direction: column; min-height: 100vh;
    }
    @media (max-width: 768px) { .admin-main { margin-right: 0; } }

    /* Admin Header */
    .admin-header {
      height: 56px; background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 40;
    }
    .admin-header-left { display: flex; align-items: center; gap: 12px; }
    .admin-header-title { font-size: 15px; font-weight: 700; }

    /* Burger */
    .burger {
      display: none; flex-direction: column; gap: 5
